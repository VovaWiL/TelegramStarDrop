<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram StarDrop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="balance">⭐ <span id="star-balance">0</span></div>
        <button class="btn-buy" onclick="fakeBuy()">+ ПОПОЛНИТЬ</button>
    </div>

    <div class="roulette-box">
        <div class="marker"></div>
        <div id="tape" class="tape"></div>
    </div>

    <div class="actions">
        <button id="spin-button" class="btn-spin" onclick="startSpin()">КРУТИТЬ ЗА 100 ⭐</button>
    </div>

    <div class="inventory-section">
        <h3>Ваш инвентарь</h3>
        <div id="inventory" class="inventory-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
